version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: gigshield-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    networks:
      - gigshield-network

  redis:
    image: redis:alpine
    container_name: gigshield-redis
    ports:
      - "6379:6379"
    networks:
      - gigshield-network

  backend:
    build: ./server
    container_name: gigshield-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/gigshield?authSource=admin
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-production-secret-key
    depends_on:
      - mongodb
      - redis
    networks:
      - gigshield-network

  frontend:
    build: ./client
    container_name: gigshield-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - gigshield-network

volumes:
  mongodb_data:

networks:
  gigshield-network:
    driver: bridge